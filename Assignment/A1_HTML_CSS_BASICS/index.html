<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>A01-HTML-CSS-BASICS</title>
</head>
<body>
    <header>
        <nav class="nav-bar">
            <ul class="nav-list">
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Services</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main class="main-container">
        <section class="picture-card">
            <figure class="card">
                <img src="./images/card-picture.png" alt="Placeholder Image">
                <figcaption class="card-title">Shree Krishna Devkota</figcaption>
            </figure>
            
            <figure class="card">
                <img src="./images/card-picture.png" alt="Placeholder Image">
                <figcaption class="card-title">Shree Krishna Devkota</figcaption>
            </figure>

            <figure class="card">
                <img src="./images/card-picture.png" alt="Placeholder Image">
                <figcaption class="card-title">Shree Krishna Devkota</figcaption>
            </figure>
        </section>
       
        <article class="form-container">
            <h3>Please fill out the form below</h3>
            
            <form action="#" method="POST" class="styled-form">
                
                <div class="form-group">
                    <label for="student-email">Email Address</label>
                    <input type="email" id="student-email" name="email" placeholder="username@student.edu" required>
                </div>

                <div class="form-group">
                    <label for="student-id">Student ID</label>
                    <input type="text" id="student-id" name="student_id" pattern="^[0-9]{9}$" placeholder="e.g., 123456789" title="Please enter exactly 9 digits." required>
                </div>

                <div class="form-group">
                    <label for="enrollment-date"> Date</label>
                    <input type="date" id="enrollment-date" name="enrollment_date" required>
                </div>

                <div class="form-group">
                    <label for="github-url"> Profile URL</label>
                    <input type="url" id="github-url" name="github_url" placeholder="https://example.com/your-username" required>
                </div>

                <div class="form-group">
                    <label for="experience-level">GPA (Scale: 1-4)</label>
                    <input type="number" id="experience-level" name="gpa" min="1" max="4" step="0.1" placeholder="4.0">
                </div>

                <div class="form-group">
                    <label for="skill-range"> experience </label>
                    <div class="range-container">
                        <span>Novice</span>
                        <input type="range" id="skill-range" name="skill_range" min="1" max="100" value="50">
                        <span>Expert</span>
                    </div>
                </div>

                <div class="form-group color-group">
                    <label for="theme-color"> choose a color</label>
                    <input type="color" id="theme-color" name="theme_color" value="#4f46e5">
                </div>

                <button type="submit" class="submit-btn">Submit Portfolio</button>
            </form>
        </article>
        <div class="animation-box"></div>

    </main>
</body>
</html>
